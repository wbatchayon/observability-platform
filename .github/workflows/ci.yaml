---
name: CI

"on":
  # Toutes les PR (y compris les PR empilées vers une branche de feature), pas seulement vers main.
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  # ── Étage 1 : vérifications rapides ─────────────────────────────
  lint:
    name: Lint (yaml / terraform / ansible / helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml
      - name: terraform fmt
        run: terraform fmt -recursive -check
      - name: tflint
        uses: terraform-linters/setup-tflint@v6.2.2
      - name: run tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for d in $(find bootstrap -name '*.tf' -exec dirname {} \; | sort -u); do
            (cd "$d" && tflint --init && tflint)
          done
      - name: ansible-lint
        uses: ansible/ansible-lint@main
        with:
          args: "ansible/"

  validate:
    name: Validate manifests (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
          find platform ingress -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 \
            | xargs -0 kubeconform -strict -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  # ── Étage 2 : analyses approfondies (après l'étage 1) ───────────
  security:
    name: Sécurité (trivy / checkov / tfsec / gitleaks / kubescape)
    runs-on: ubuntu-latest
    needs: [lint, validate]
    # Scanners en mode RAPPORT (advisory) : résultats dans le log du job, sans annotations
    # bloquantes. À durcir en bloquant après triage de la baseline — cf. docs/governance.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks (secrets)
        run: |
          set +e
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks detect --no-banner --redact
          exit 0
      - name: trivy config (IaC)
        run: |
          set +e
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy config --severity HIGH,CRITICAL .
          exit 0
      - name: checkov (IaC)
        run: |
          set +e
          pipx install checkov
          checkov -d . --compact --quiet --soft-fail
          exit 0
      - name: tfsec (Terraform)
        run: |
          set +e
          curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 \
            -o /tmp/tfsec && chmod +x /tmp/tfsec && sudo mv /tmp/tfsec /usr/local/bin/tfsec
          tfsec bootstrap/ --soft-fail
          exit 0
      - name: kubescape (manifests)
        run: |
          set +e
          curl -sSL https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | bash
          export PATH="$PATH:$HOME/.kubescape/bin:$HOME/.local/bin"
          kubescape scan framework nsa platform/ ingress/ --keep-going
          exit 0

  policy:
    name: Policy as code (conftest / OPA)
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v5
      - name: conftest
        run: |
          set -euo pipefail
          if [ ! -d ci/policy ]; then
            echo "Aucune politique conftest (ci/policy absent) — étape passée."
            exit 0
          fi
          VER=$(curl -fsSL https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep -oP '"tag_name": "v\K[^"]+')
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${VER}/conftest_${VER}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin conftest
          conftest test platform/ --policy ci/policy

  iac-plan:
    name: Terraform plan + Flux diff (commentaire PR)
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
      - name: terraform validate (tous les modules)
        run: |
          for d in $(find bootstrap -name '*.tf' -exec dirname {} \; | sort -u); do
            (cd "$d" && terraform init -backend=false && terraform validate)
          done
      - name: Commentaire de plan sur la PR
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Terraform validate OK. Le `terraform plan` détaillé et le `flux diff` sont produits par le runner GitOps de l\'environnement cible.'
            })

  # ── Étage 3 : supply chain (après les analyses) ─────────────────
  supply-chain:
    name: SBOM + signature (syft / cosign)
    runs-on: ubuntu-latest
    needs: [security, policy]
    steps:
      - uses: actions/checkout@v5
      - name: Génération SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: observability-platform.sbom.json
      - name: Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign SBOM (keyless OIDC)
        if: github.event_name == 'push'
        run: cosign sign-blob --yes observability-platform.sbom.json \
          --output-signature observability-platform.sbom.sig
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: observability-platform.sbom.*
