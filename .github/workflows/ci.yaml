---
name: CI

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  lint:
    name: Lint (yaml / terraform / ansible / helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml
      - name: terraform fmt
        run: terraform fmt -recursive -check
      - name: tflint
        uses: terraform-linters/setup-tflint@v4
      - name: run tflint
        run: |
          for d in $(find bootstrap -name '*.tf' -exec dirname {} \; | sort -u); do
            (cd "$d" && tflint --init && tflint)
          done
      - name: ansible-lint
        uses: ansible/ansible-lint@main
        with:
          args: "ansible/"

  validate:
    name: Validate manifests (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
          find platform ingress -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 \
            | xargs -0 kubeconform -strict -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  security:
    name: Sécurité (trivy / checkov / tfsec / gitleaks / kubescape)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
      - name: Trivy config (IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          quiet: true
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: bootstrap/
      - name: kubescape
        uses: kubescape/github-action@main
        with:
          files: "platform/ ingress/"
          frameworks: nsa

  policy:
    name: Policy as code (conftest / OPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin conftest
          if [ -d ci/policy ]; then conftest test platform/ --policy ci/policy; fi

  supply-chain:
    name: SBOM + signature (syft / cosign)
    runs-on: ubuntu-latest
    needs: [lint, validate, security]
    steps:
      - uses: actions/checkout@v4
      - name: Génération SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: observability-platform.sbom.json
      - name: Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign SBOM (keyless OIDC)
        if: github.event_name == 'push'
        run: cosign sign-blob --yes observability-platform.sbom.json \
          --output-signature observability-platform.sbom.sig
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: observability-platform.sbom.*

  iac-plan:
    name: Terraform plan + Flux diff (commentaire PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform validate (tous les modules)
        run: |
          for d in $(find bootstrap -name '*.tf' -exec dirname {} \; | sort -u); do
            (cd "$d" && terraform init -backend=false && terraform validate)
          done
      - name: Commentaire de plan sur la PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Terraform validate OK. Le `terraform plan` détaillé et le `flux diff` sont produits par le runner GitOps de l\'environnement cible.'
            })
