---
# Pipeline d'automatisation des montées de version (Renovate self-hosted).
# Détecte les nouvelles versions (Terraform, charts Helm, images, GitHub Actions, collections
# Ansible) et ouvre des Pull Requests automatiquement. L'auto-merge des mises à jour sûres et le
# routage des majeures vers une revue humaine sont pilotés par .github/renovate.json (+ RACI).
name: Renovate

"on":
  schedule:
    # Lundi 04:00 UTC — cohérent avec le schedule de renovate.json.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Niveau de log Renovate"
        type: choice
        default: info
        options: [info, debug]
      dryRun:
        description: "Dry-run (aucune PR créée)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate (dependency PRs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          configurationFile: .github/renovate.json
          # PAT (ou token d'app GitHub) avec droits contents+PR. Voir docs/how-it-works.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ (inputs.dryRun && 'full') || '' }}
