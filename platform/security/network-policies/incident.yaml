# NetworkPolicies du namespace incident (OneUptime, GLPI, MariaDB) : deny-by-default + flux ciblés.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: incident
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# DNS sortant.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: incident
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Trafic intra-namespace (OneUptime -> GLPI API, GLPI -> MariaDB).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-incident
  namespace: incident
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Ingress depuis monitoring (webhook Alertmanager) et flux-system (notifications Flux) vers OneUptime.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alerts-to-oneuptime
  namespace: incident
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
---
# Egress HTTPS (notifications externes : Slack/Teams/SMTP). En air-gap, restreindre à la passerelle.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: incident
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: TCP
          port: 443
