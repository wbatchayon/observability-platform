---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: kyverno
  namespace: security
spec:
  interval: 1h
  type: oci
  url: oci://${HARBOR_REGISTRY}/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "${KYVERNO_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: kyverno
  values:
    admissionController:
      replicas: 3
