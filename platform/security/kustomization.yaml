apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - cert-manager.yaml
  - cluster-issuer-vault.yaml
  - kyverno.yaml
  - kyverno-policies/require-signed-images.yaml
  - kyverno-policies/pod-security.yaml
  # --- NetworkPolicies (NETWORK_POLICIES_ENABLED) ---
  # Kustomize ne sait pas supprimer conditionnellement une ressource via une variable
  # Flux. Pour DÉSACTIVER les NetworkPolicies sur un cluster qui ne supporte pas
  # l'API networking (ou sans CNI NetworkPolicy), COMMENTEZ les 5 lignes ci-dessous.
  # Voir platform/security/README.md (section « Désactiver les NetworkPolicies »).
  - network-policies/default-deny.yaml
  - network-policies/allow-dns.yaml
  - network-policies/allow-flows.yaml
  - network-policies/allow-egress.yaml
  - network-policies/incident.yaml
  - rbac/observability-rbac.yaml
