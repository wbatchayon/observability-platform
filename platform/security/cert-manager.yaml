---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: jetstack
  namespace: security
spec:
  interval: 1h
  type: oci
  url: oci://${HARBOR_REGISTRY}/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "${CERT_MANAGER_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: jetstack
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    prometheus:
      enabled: true
    # ServiceAccount utilisé par l'auth Kubernetes de Vault (rôle cert-manager).
    serviceAccount:
      create: true
      name: cert-manager
