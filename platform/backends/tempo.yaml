---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: backends
spec:
  interval: 30m
  chart:
    spec:
      chart: tempo-distributed
      version: "1.10.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
  values:
    storage:
      trace:
        backend: s3
        s3:
          endpoint: minio.storage.svc.cluster.local:9000
          bucket: tempo
          access_key: ${MINIO_ACCESS_KEY}
          secret_key: ${MINIO_SECRET_KEY}
          insecure: false
    multitenancyEnabled: true
    traces:
      otlp:
        grpc:
          enabled: true        # receiver OTLP gRPC sur 4317
    distributor:
      replicas: 2
    ingester:
      replicas: ${TEMPO_INGESTER_REPLICAS}
    querier:
      replicas: 2
    queryFrontend:
      replicas: 1
    compactor:
      replicas: 1
      config:
        compaction:
          block_retention: ${TEMPO_RETENTION}
