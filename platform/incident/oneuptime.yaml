---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: oneuptime
  namespace: incident
spec:
  interval: 1h
  type: oci
  url: oci://${HARBOR_REGISTRY}/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oneuptime
  namespace: incident
spec:
  interval: 30m
  chart:
    spec:
      chart: oneuptime
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: oneuptime
  values:
    # Service nommé "oneuptime" -> reçoit les webhooks Alertmanager.
    fullnameOverride: oneuptime
    persistence:
      enabled: true
    postgresql:
      enabled: true
    redis:
      enabled: true
    ingress:
      enabled: false      # exposition gérée par ingress/ si nécessaire
