---
# Base de données GLPI.
apiVersion: v1
kind: Secret
metadata:
  name: glpi-db
  namespace: incident
type: Opaque
stringData:
  mysql-root-password: ${GLPI_DB_ROOT_PASSWORD}
  mysql-password: ${GLPI_DB_PASSWORD}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: glpi-mariadb
  namespace: incident
spec:
  serviceName: glpi-mariadb
  replicas: 1
  selector:
    matchLabels:
      app: glpi-mariadb
  template:
    metadata:
      labels:
        app: glpi-mariadb
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: ${HARBOR_REGISTRY}/library/mariadb:11.4
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: MARIADB_DATABASE
              value: glpi
            - name: MARIADB_USER
              value: glpi
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glpi-db
                  key: mysql-password
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glpi-db
                  key: mysql-root-password
          ports:
            - containerPort: 3306
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["sh", "-c", "mariadb-admin ping -h 127.0.0.1 -p$MARIADB_ROOT_PASSWORD"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run/mysqld
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGE_CLASS}
        resources:
          requests:
            storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: incident
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glpi
  template:
    metadata:
      labels:
        app: glpi
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: glpi
          image: ${HARBOR_REGISTRY}/library/diouxx/glpi:10.0.15
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: TIMEZONE
              value: Europe/Paris
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: glpi
  namespace: incident
spec:
  selector:
    app: glpi
  ports:
    - port: 80
      targetPort: 80
