---
# Certificat mTLS du gateway (server + client auth) émis par la PKI Vault.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otel-gateway-tls
  namespace: ingestion
spec:
  secretName: otel-gateway-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: otel-gateway.ingestion.svc.cluster.local
  dnsNames:
    - otel-gateway.ingestion.svc.cluster.local
    - otel-gateway.ingestion.svc
  usages:
    - server auth
    - client auth
    - digital signature
    - key encipherment
---
# Certificat mTLS des edge collectors (client vers le gateway).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otel-edge-tls
  namespace: ingestion
spec:
  secretName: otel-edge-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: otel-edge.ingestion.svc.cluster.local
  dnsNames:
    - otel-edge.ingestion.svc.cluster.local
  usages:
    - server auth
    - client auth
    - digital signature
    - key encipherment
