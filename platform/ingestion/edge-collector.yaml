---
# Edge Collector : reçoit l'OTLP des agents (par DC), buffer/compresse, exporte vers le gateway.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-edge
  namespace: ingestion
spec:
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.93.0"
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
  values:
    # StatefulSet : file persistante sur PVC (survie aux redémarrages), pas emptyDir.
    mode: statefulset
    replicaCount: ${OTEL_EDGE_REPLICAS}
    image:
      repository: harbor.observability.internal/otel-packages/opentelemetry-collector-contrib
      tag: "0.148.0"
    statefulset:
      volumeClaimTemplates:
        - metadata:
            name: queue
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: ${STORAGE_CLASS}
            resources:
              requests:
                storage: 5Gi
    extraVolumes:
      - name: tls
        secret:
          secretName: otel-edge-tls
    extraVolumeMounts:
      - name: tls
        mountPath: /etc/otel/tls
        readOnly: true
      - name: queue
        mountPath: /var/lib/otel/queue
    config:
      extensions:
        health_check: {}
        file_storage:
          directory: /var/lib/otel/queue
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              tls:
                cert_file: /etc/otel/tls/tls.crt
                key_file: /etc/otel/tls/tls.key
                client_ca_file: /etc/otel/tls/ca.crt
      processors:
        memory_limiter:
          check_interval: 5s
          limit_percentage: 75
          spike_limit_percentage: 20
        filter/preliminary:
          error_mode: ignore
          logs:
            log_record:
              - 'severity_number < SEVERITY_NUMBER_DEBUG'
        batch:
          send_batch_size: 8192
          timeout: 5s
      exporters:
        otlp/gateway:
          endpoint: otel-gateway.ingestion.svc.cluster.local:4317
          compression: gzip
          tls:
            insecure: false
            ca_file: /etc/otel/tls/ca.crt
            cert_file: /etc/otel/tls/tls.crt
            key_file: /etc/otel/tls/tls.key
          sending_queue:
            enabled: true
            storage: file_storage
          retry_on_failure:
            enabled: true
      service:
        extensions: [health_check, file_storage]
        pipelines:
          logs:
            receivers: [otlp]
            processors: [memory_limiter, filter/preliminary, batch]
            exporters: [otlp/gateway]
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/gateway]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/gateway]
