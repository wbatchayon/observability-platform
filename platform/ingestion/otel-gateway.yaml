---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: opentelemetry
  namespace: ingestion
spec:
  interval: 1h
  type: oci
  url: oci://${HARBOR_REGISTRY}/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-gateway
  namespace: ingestion
spec:
  interval: 30m
  chart:
    spec:
      chart: opentelemetry-collector
      version: "${OTEL_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
  values:
    # StatefulSet : la file persistante (file_storage) doit survivre aux redémarrages (PVC, pas emptyDir).
    mode: statefulset
    replicaCount: ${OTEL_GATEWAY_REPLICAS}
    image:
      repository: harbor.observability.internal/otel-packages/opentelemetry-collector-contrib
      tag: "0.148.0"
    statefulset:
      volumeClaimTemplates:
        - metadata:
            name: queue
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: ${STORAGE_CLASS}
            resources:
              requests:
                storage: 10Gi
    extraVolumes:
      - name: tls
        secret:
          secretName: otel-gateway-tls
    extraVolumeMounts:
      - name: tls
        mountPath: /etc/otel/tls
        readOnly: true
      - name: queue
        mountPath: /var/lib/otel/queue
    config:
      extensions:
        health_check: {}
        zpages: {}
        file_storage:
          directory: /var/lib/otel/queue
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              tls:
                cert_file: /etc/otel/tls/tls.crt
                key_file: /etc/otel/tls/tls.key
                client_ca_file: /etc/otel/tls/ca.crt
            http:
              endpoint: 0.0.0.0:4318
      processors:
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 25
        filter/drop-debug:
          error_mode: ignore
          logs:
            log_record:
              - 'severity_number < SEVERITY_NUMBER_INFO'
        resource:
          attributes:
            - key: collector
              value: gateway
              action: upsert
        attributes/enrich:
          actions:
            - key: environment
              value: ${ENVIRONMENT}
              action: upsert
        batch:
          send_batch_size: 8192
          timeout: 5s
        tail_sampling:
          decision_wait: 10s
          policies:
            - name: errors
              type: status_code
              status_code:
                status_codes: [ERROR]
            - name: sample-rest
              type: probabilistic
              probabilistic:
                sampling_percentage: ${TRACE_SAMPLING_PERCENT}
      exporters:
        loki:
          endpoint: http://loki-gateway.backends.svc.cluster.local/loki/api/v1/push
          sending_queue:
            enabled: true
            storage: file_storage
          retry_on_failure:
            enabled: true
        prometheusremotewrite:
          endpoint: http://mimir-distributor.backends.svc.cluster.local/api/v1/push
          headers:
            X-Scope-OrgID: ${TENANT_ID}
          retry_on_failure:
            enabled: true
        otlp/tempo:
          endpoint: tempo-distributor.backends.svc.cluster.local:4317
          tls:
            insecure: false
            ca_file: /etc/otel/tls/ca.crt
            cert_file: /etc/otel/tls/tls.crt
            key_file: /etc/otel/tls/tls.key
          sending_queue:
            enabled: true
            storage: file_storage
          retry_on_failure:
            enabled: true
      service:
        extensions: [health_check, zpages, file_storage]
        pipelines:
          logs:
            receivers: [otlp]
            processors: [memory_limiter, filter/drop-debug, resource, attributes/enrich, batch]
            exporters: [loki]
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, resource, attributes/enrich, batch]
            exporters: [prometheusremotewrite]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resource, attributes/enrich, tail_sampling, batch]
            exporters: [otlp/tempo]
