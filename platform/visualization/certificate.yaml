---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: visualization
spec:
  secretName: grafana-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: grafana.visualization.svc.cluster.local
  dnsNames:
    - grafana.visualization.svc.cluster.local
    - ${GRAFANA_DOMAIN}
  usages:
    - server auth
    - digital signature
    - key encipherment
