---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-component-health
  namespace: visualization
  labels:
    grafana_dashboard: "1"
data:
  component-health.json: |
    {
      "uid": "obs-health",
      "title": "Observabilité — Santé des composants",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Cibles UP",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "targets": [{"expr": "count(up == 1)", "legendFormat": "up"}]
        },
        {
          "id": 2,
          "title": "Erreurs 5xx backends (taux)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 16, "x": 8, "y": 0},
          "targets": [
            {"expr": "sum(rate(loki_request_duration_seconds_count{status_code=~\"5..\"}[5m]))", "legendFormat": "loki 5xx"}
          ]
        }
      ]
    }
