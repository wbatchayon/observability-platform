---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: minio
  namespace: storage
spec:
  interval: 1h
  url: https://charts.min.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: storage
spec:
  interval: 30m
  chart:
    spec:
      chart: minio
      version: "5.2.0"
      sourceRef:
        kind: HelmRepository
        name: minio
  values:
    mode: distributed
    replicas: ${MINIO_REPLICAS}
    persistence:
      enabled: true
      size: ${MINIO_VOLUME_SIZE}
    # Credentials injectés depuis le secret minio-credentials (SOPS).
    existingSecret: minio-credentials
    # TLS via cert-manager (vault-issuer).
    tls:
      enabled: true
      certSecret: minio-tls
      publicCrt: tls.crt
      privateKey: tls.key
    resources:
      requests:
        memory: 2Gi
        cpu: "1"
      limits:
        memory: 4Gi
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
