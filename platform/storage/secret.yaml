---
# Structure du secret MinIO. Les valeurs sont injectées par Flux postBuild depuis le Secret
# env-secrets (déchiffré de SOPS) — JAMAIS en clair dans Git.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: storage
type: Opaque
stringData:
  accesskey: ${MINIO_ACCESS_KEY}
  secretkey: ${MINIO_SECRET_KEY}
  # Clés attendues par le chart MinIO.
  rootUser: ${MINIO_ACCESS_KEY}
  rootPassword: ${MINIO_SECRET_KEY}
