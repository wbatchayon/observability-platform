---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 1h
  type: oci
  url: oci://${HARBOR_REGISTRY}/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "${KUBE_PROM_STACK_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    prometheus:
      prometheusSpec:
        replicas: 2
        retention: ${PROMETHEUS_RETENTION}
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        # Découverte des cibles dans tous les namespaces de la plateforme.
        serviceMonitorNamespaceSelector:
          matchLabels:
            app.kubernetes.io/part-of: observability
        additionalScrapeConfigs:
          - job_name: otel-gateway
            static_configs:
              - targets: ["otel-gateway.ingestion.svc.cluster.local:8888"]
          - job_name: minio
            metrics_path: /minio/v2/metrics/cluster
            scheme: https
            tls_config:
              insecure_skip_verify: false
            static_configs:
              - targets: ["minio.storage.svc.cluster.local:9000"]
    grafana:
      enabled: false        # Grafana est géré par platform/visualization
    alertmanager:
      enabled: true
      alertmanagerSpec:
        # Sélectionne notre AlertmanagerConfig (label alertmanagerConfig: observability).
        alertmanagerConfigSelector:
          matchLabels:
            alertmanagerConfig: observability
        alertmanagerConfigMatcherStrategy:
          type: None
