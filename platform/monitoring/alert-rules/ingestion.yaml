---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ingestion-health
  namespace: monitoring
spec:
  groups:
    - name: ingestion.rules
      rules:
        - alert: OtelGatewayDown
          expr: absent(up{job="otel-gateway"} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "OTel Gateway indisponible"
            description: "Aucune instance du gateway OTel ne répond."
        - alert: OtelQueueSaturation
          expr: otelcol_exporter_queue_size / otelcol_exporter_queue_capacity > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "File d'export OTel proche de la saturation"
            description: "La file d'export dépasse 80% de sa capacité."
        - alert: OtelDataRefused
          expr: sum(rate(otelcol_receiver_refused_spans[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Données refusées par le collector"
            description: "Le collector refuse des spans (backpressure/limite mémoire)."
