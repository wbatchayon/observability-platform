---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backends-health
  namespace: monitoring
spec:
  groups:
    - name: backends.rules
      rules:
        - alert: LokiIngestionErrors
          expr: sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Erreurs d'ingestion Loki"
            description: "Loki renvoie des erreurs 5xx depuis 10 minutes."
        - alert: MimirIngesterUnhealthy
          expr: sum(up{job=~".*mimir.*"}) < 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Ingesters Mimir insuffisants"
            description: "Moins de 2 ingesters Mimir sont disponibles."
        - alert: TempoDistributorDown
          expr: absent(up{job=~".*tempo-distributor.*"} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Tempo distributor indisponible"
            description: "Le distributor Tempo ne répond plus."
