#cloud-config
# Prépare un nœud Kubernetes (test Proxmox) : containerd + kubeadm/kubelet/kubectl.
# Pour un test avec accès Internet. En air-gap, pointer les dépôts vers le miroir interne.
package_update: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - qemu-guest-agent

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

runcmd:
  - systemctl enable --now qemu-guest-agent
  # Modules + sysctl
  - modprobe overlay && modprobe br_netfilter && sysctl --system
  # Désactiver le swap (exigence kubeadm)
  - swapoff -a
  - sed -i '/ swap / s/^/#/' /etc/fstab
  # containerd
  - apt-get update && apt-get install -y containerd
  - mkdir -p /etc/containerd
  - containerd config default | tee /etc/containerd/config.toml >/dev/null
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - systemctl restart containerd && systemctl enable containerd
  # Dépôt Kubernetes (v1.29) + binaires
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' > /etc/apt/sources.list.d/kubernetes.list
  - apt-get update && apt-get install -y kubelet kubeadm kubectl
  - apt-mark hold kubelet kubeadm kubectl
  - systemctl enable kubelet
