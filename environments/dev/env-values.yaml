---
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-values
  namespace: flux-system
data:
  ENVIRONMENT: "dev"
  TENANT_ID: "observability"
  VAULT_ADDR: "https://vault.vault.svc.cluster.local:8200"
  MINIO_REPLICAS: "4"
  MINIO_VOLUME_SIZE: "50Gi"
  LOKI_RETENTION: "168h"
  LOKI_INGESTER_REPLICAS: "2"
  MIMIR_RETENTION: "720h"
  MIMIR_INGESTER_REPLICAS: "2"
  TEMPO_RETENTION: "168h"
  TEMPO_INGESTER_REPLICAS: "2"
  OTEL_GATEWAY_REPLICAS: "2"
  OTEL_EDGE_REPLICAS: "1"
  TRACE_SAMPLING_PERCENT: "50"
  PROMETHEUS_RETENTION: "7d"
  GRAFANA_DOMAIN: "grafana.dev.observability.internal"
  GRAFANA_OAUTH_ENABLED: "false"
  GRAFANA_OAUTH_CLIENT_ID: "dev-client"
  GRAFANA_OAUTH_AUTH_URL: "https://sso.example.com/authorize"
  GRAFANA_OAUTH_TOKEN_URL: "https://sso.example.com/token"
  GRAFANA_OAUTH_API_URL: "https://sso.example.com/userinfo"
  GRAFANA_ADMIN_USER: "admin"
  OTLP_DOMAIN: "otlp.dev.observability.internal"
