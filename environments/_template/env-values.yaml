---
# ConfigMap `env-values` - toutes les variables NON sensibles injectées par Flux (postBuild
# substituteFrom) dans les manifests platform/. C'est ici qu'on adapte un environnement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-values
  namespace: flux-system
data:
  # --- Global ---
  ENVIRONMENT: "REMPLACEZ"          # dev | staging | prod
  TENANT_ID: "observability"
  VAULT_ADDR: "https://vault.vault.svc.cluster.local:8200"
  HARBOR_REGISTRY: "harbor.observability.internal"

  # --- Portabilité ---
  # STORAGE_CLASS : StorageClass appliquée à TOUS les PVC de platform/ (champ
  # storageClassName). DOIT être renseignée selon la plateforme cible :
  #   - k3s/local-path        -> "local-path"
  #   - AWS EKS               -> "gp3"
  #   - Azure AKS             -> "managed-csi"
  #   - GCP GKE               -> "standard-rwo"
  #   - OpenShift             -> "ocs-storagecluster-ceph-rbd" (ou la SC par défaut)
  # NB : la substitution Flux ne peut PAS omettre le champ. Pour utiliser la
  # StorageClass par défaut du cluster, renseignez explicitement son nom ici.
  STORAGE_CLASS: "local-path"
  # LB_SERVICE_TYPE : type du Service d'exposition de l'ingress (ingress/haproxy).
  #   - "LoadBalancer" : cloud / MetalLB (défaut)
  #   - "NodePort"     : clusters sans contrôleur de LB
  #   - "ClusterIP"    : exposition via Route OpenShift / Ingress externe
  LB_SERVICE_TYPE: "LoadBalancer"
  # NETWORK_POLICIES_ENABLED : indicateur documentaire. Kustomize ne peut pas
  # supprimer conditionnellement une ressource via une variable. Pour DÉSACTIVER
  # les NetworkPolicies, commentez les lignes network-policies/* dans
  # platform/security/kustomization.yaml (voir platform/security/README.md).
  NETWORK_POLICIES_ENABLED: "true"

  # --- Stockage (MinIO) ---
  MINIO_REPLICAS: "4"
  MINIO_VOLUME_SIZE: "200Gi"

  # --- Backends ---
  LOKI_RETENTION: "720h"            # 30j
  LOKI_INGESTER_REPLICAS: "3"
  MIMIR_RETENTION: "8760h"          # 1 an
  MIMIR_INGESTER_REPLICAS: "3"
  TEMPO_RETENTION: "336h"           # 14j
  TEMPO_INGESTER_REPLICAS: "3"

  # --- Ingestion ---
  OTEL_GATEWAY_REPLICAS: "3"
  OTEL_EDGE_REPLICAS: "1"
  TRACE_SAMPLING_PERCENT: "10"

  # --- Monitoring ---
  PROMETHEUS_RETENTION: "15d"

  # --- Visualisation (Grafana) ---
  GRAFANA_DOMAIN: "grafana.observability.internal"
  GRAFANA_OAUTH_ENABLED: "false"
  GRAFANA_OAUTH_CLIENT_ID: "REMPLACEZ"
  GRAFANA_OAUTH_AUTH_URL: "https://sso.example.com/authorize"
  GRAFANA_OAUTH_TOKEN_URL: "https://sso.example.com/token"
  GRAFANA_OAUTH_API_URL: "https://sso.example.com/userinfo"
  GRAFANA_ADMIN_USER: "admin"

  # --- Ingress ---
  OTLP_DOMAIN: "otlp.observability.internal"

  # --- Patch management (versions des charts) ---
  # Montée de version : changez le numéro puis lancez le déploiement (console GUI
  # « Patch management » ou `make deploy`). Renovate propose les versions stables.
  CERT_MANAGER_CHART_VERSION: "v1.14.4"
  KYVERNO_CHART_VERSION: "3.2.1"
  MINIO_CHART_VERSION: "5.2.0"
  LOKI_CHART_VERSION: "6.6.2"
  MIMIR_CHART_VERSION: "5.4.0"
  TEMPO_CHART_VERSION: "1.10.1"
  OTEL_CHART_VERSION: "0.93.0"
  KUBE_PROM_STACK_CHART_VERSION: "59.1.0"
  GRAFANA_CHART_VERSION: "7.3.11"
  ONEUPTIME_CHART_VERSION: "7.0.0"
