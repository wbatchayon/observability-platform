---
# Secret `env-secrets` - variables SENSIBLES injectées par Flux (postBuild substituteFrom).
# CE FICHIER DOIT ÊTRE CHIFFRÉ AVEC SOPS avant tout commit : `make encrypt ENV=<env>`.
# Les valeurs ci-dessous sont des PLACEHOLDERS à remplacer puis chiffrer.
apiVersion: v1
kind: Secret
metadata:
  name: env-secrets
  namespace: flux-system
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "REMPLACEZ"
  MINIO_SECRET_KEY: "REMPLACEZ"
  GRAFANA_ADMIN_PASSWORD: "REMPLACEZ"
  GRAFANA_OAUTH_CLIENT_SECRET: "REMPLACEZ"
  GLPI_DB_ROOT_PASSWORD: "REMPLACEZ"
  GLPI_DB_PASSWORD: "REMPLACEZ"
  SLACK_WEBHOOK_URL: "REMPLACEZ"
  TEAMS_WEBHOOK_URL: "REMPLACEZ"
  SMTP_PASSWORD: "REMPLACEZ"
