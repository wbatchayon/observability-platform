---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: haproxytech
  namespace: ingress
spec:
  interval: 1h
  url: https://haproxytech.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy
  namespace: ingress
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-ingress
      version: "1.41.0"
      sourceRef:
        kind: HelmRepository
        name: haproxytech
  values:
    controller:
      replicaCount: 2          # active/active
      podAntiAffinity: hard
      service:
        type: LoadBalancer
      config:
        # Least-connections + timeouts gRPC + retries.
        balance-algorithm: leastconn
        timeout-connect: "30s"
        timeout-client: "30s"
        timeout-server: "30s"
        ssl-redirect: "true"
      defaultTLSSecret:
        enabled: true
        secret: ingress/grafana-tls
