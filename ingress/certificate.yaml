---
# Certificat du point d'entrée OTLP (pour edge collectors / agents externes).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otlp-ingress-tls
  namespace: ingress
spec:
  secretName: otlp-ingress-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: ${OTLP_DOMAIN}
  dnsNames:
    - ${OTLP_DOMAIN}
  usages:
    - server auth
    - digital signature
    - key encipherment
---
# Certificat du point d'entrée Grafana (HTTPS).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: ingress
spec:
  secretName: grafana-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: ${GRAFANA_DOMAIN}
  dnsNames:
    - ${GRAFANA_DOMAIN}
  usages:
    - server auth
    - digital signature
    - key encipherment
