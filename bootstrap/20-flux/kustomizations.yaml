---
# Source Git : le dépôt GitOps suivi par Flux.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: observability-platform
  namespace: flux-system
spec:
  interval: 5m
  ref:
    branch: main
  url: https://github.com/org/observability-platform
  secretRef:
    name: flux-system
---
# Kustomization racine : réconcilie platform/ en injectant l'overlay de l'environnement.
# La substitution ${...} est alimentée par le ConfigMap/Secret de environments/<env>.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: observability-platform
  path: ./platform
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: env-values
        optional: false
      - kind: Secret
        name: env-secrets
        optional: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: loki
      namespace: backends
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: grafana
      namespace: visualization
